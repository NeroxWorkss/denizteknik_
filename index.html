<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deniz Teknik</title>

<style>
body{
  margin:0;

  background:linear-gradient(135deg,#001f3f,#003366);

header{
  position:fixed;
  top:0;
  width:100%;

}

.hero p{

  color:#aeefff;
  margin-bottom:30px;
}

.btn{
  padding:15px 40px;
  border:none;
  border-radius:30px;
  font-size:18px;
  cursor:pointer;
  background:#00e0ff;
  color:black;
  font-weight:bold;
}

footer{
  background:#001f3f;
  text-align:center;
  padding:20px;
  color:#94cfff;
}

.call-float{
  position:fixed;
  bottom:30px;
  right:20px;
  background:#22c55e;
  width:65px;
  height:65px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;

</html>
